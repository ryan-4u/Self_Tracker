<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#0a0a0a">
<title>Aaryan OS</title>
<link rel="stylesheet" href="style.css">
<style>
.view-tab { flex:1;padding:7px 4px;border:1px solid var(--border);background:none;border-radius:var(--radius);font-size:12px;font-weight:500;font-family:var(--font);color:var(--text3);cursor:pointer;transition:all .15s; }
.view-tab.active { background:var(--accent);color:#000;border-color:var(--accent); }
.spiral-wrap { width:100%;aspect-ratio:1;max-width:160px;margin:0 auto;display:block; }
</style>
</head>
<body>
<div class="topbar"></div>
<div class="page fade-in">

  <div style="padding:20px 0 8px;">
    <div class="accent-line"></div>
    <div style="font-size:11px;color:var(--text3);font-family:var(--mono);letter-spacing:1px;" id="day-label">DAY 1</div>
    <div style="font-size:22px;font-weight:700;margin-top:4px;letter-spacing:-0.3px;" id="greeting">Good morning.</div>
    <div style="font-size:12px;color:var(--text2);margin-top:4px;" id="phase-label">Phase 1 — Reset &amp; Build</div>
  </div>

  <!-- TIME NAV -->
  <div style="background:var(--bg1);border:1px solid var(--border);border-radius:var(--radius-lg);padding:12px;margin-bottom:10px;">
    <div style="display:flex;gap:4px;margin-bottom:10px;">
      <button class="view-tab active" onclick="setView('day',this)">Day</button>
      <button class="view-tab" onclick="setView('week',this)">Week</button>
      <button class="view-tab" onclick="setView('month',this)">Month</button>
      <button class="view-tab" onclick="setView('year',this)">Year</button>
    </div>
    <div style="display:flex;align-items:center;justify-content:space-between;">
      <button class="btn btn-ghost btn-sm" onclick="nav(-1)">&#8592;</button>
      <div style="text-align:center;">
        <div style="font-size:13px;font-weight:600;" id="nav-label">Today</div>
        <div style="font-size:10px;font-family:var(--mono);color:var(--text3);" id="nav-sub"></div>
      </div>
      <button class="btn btn-ghost btn-sm" id="btn-fwd" onclick="nav(1)">&#8594;</button>
    </div>
  </div>

  <!-- SCORE -->
  <div class="card">
    <div class="row-between" style="margin-bottom:10px;">
      <div>
        <div style="font-size:11px;color:var(--text3);font-family:var(--mono);" id="score-period-lbl">TODAY</div>
        <div style="font-size:36px;font-weight:700;line-height:1;" id="overall-score">—</div>
      </div>
      <div style="text-align:right;">
        <span class="badge badge-gray" id="score-badge" style="font-size:13px;padding:5px 14px;"></span>
        <div style="font-size:11px;color:var(--text3);font-family:var(--mono);margin-top:6px;" id="score-detail"></div>
      </div>
    </div>
    <div class="prog-wrap"><div class="prog-track"><div class="prog-fill" id="overall-bar" style="width:0%"></div></div></div>
  </div>

  <!-- DUAL SPIRALS -->
  <p class="sec-label">Phase spirals</p>
  <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px;">
    <div class="card" style="padding:12px;text-align:center;">
      <canvas id="spiral-overall" class="spiral-wrap"></canvas>
      <div style="font-size:10px;color:var(--text3);font-family:var(--mono);margin-top:6px;">Overall score</div>
    </div>
    <div class="card" style="padding:12px;text-align:center;">
      <canvas id="spiral-habits" class="spiral-wrap"></canvas>
      <div style="font-size:10px;color:var(--text3);font-family:var(--mono);margin-top:6px;">Habit completion</div>
    </div>
  </div>

  <!-- PILLARS -->
  <p class="sec-label">Pillar breakdown</p>
  <div class="stat-grid">
    <div class="stat-block" style="text-align:left;cursor:pointer;" onclick="location.href='habits.html'">
      <div style="font-size:10px;color:var(--text3);font-family:var(--mono);margin-bottom:6px;">HABITS</div>
      <div style="font-size:22px;font-weight:700;" id="p-habits">—</div>
      <div class="prog-wrap" style="margin-top:8px;"><div class="prog-track"><div class="prog-fill green" id="pb-habits" style="width:0%"></div></div></div>
    </div>
    <div class="stat-block" style="text-align:left;cursor:pointer;" onclick="location.href='dsa.html'">
      <div style="font-size:10px;color:var(--text3);font-family:var(--mono);margin-bottom:6px;">DSA</div>
      <div style="font-size:22px;font-weight:700;" id="p-dsa">—</div>
      <div style="font-size:10px;color:var(--text3);font-family:var(--mono);margin-top:4px;" id="p-dsa-sub"></div>
    </div>
    <div class="stat-block" style="text-align:left;cursor:pointer;" onclick="location.href='webdev.html'">
      <div style="font-size:10px;color:var(--text3);font-family:var(--mono);margin-bottom:6px;">WEB DEV</div>
      <div style="font-size:22px;font-weight:700;" id="p-webdev">—</div>
      <div style="font-size:10px;color:var(--text3);font-family:var(--mono);margin-top:4px;" id="p-webdev-sub"></div>
    </div>
    <div class="stat-block" style="text-align:left;cursor:pointer;" onclick="location.href='interview.html'">
      <div style="font-size:10px;color:var(--text3);font-family:var(--mono);margin-bottom:6px;">INTERVIEWS</div>
      <div style="font-size:22px;font-weight:700;" id="p-interview">—</div>
      <div style="font-size:10px;color:var(--text3);font-family:var(--mono);margin-top:4px;" id="p-interview-sub"></div>
    </div>
  </div>

  <p class="sec-label" id="chart-label">Score over time</p>
  <div class="card"><div class="chart-wrap"><canvas id="chart-period"></canvas></div></div>

  <!-- DAY DETAILS -->
  <div id="day-details">
    <p class="sec-label">Habits today</p>
    <div class="card" id="habits-today-list"></div>
    <p class="sec-label">Last check-in</p>
    <div class="card" id="last-checkin"><div class="empty">No check-in yet.</div></div>
    <p class="sec-label">DSA breakdown</p>
    <div class="card"><div style="display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:8px;" id="dsa-breakdown"></div></div>
    <p class="sec-label">Interview pipeline</p>
    <div class="card" id="interview-pipeline"><div class="empty">No applications.</div></div>
  </div>

  <p class="sec-label">Quick actions</p>
  <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;padding-bottom:32px;">
    <button class="btn btn-ghost btn-full" onclick="location.href='checkin.html'">+ Check-in</button>
    <button class="btn btn-ghost btn-full" onclick="location.href='dsa.html'">+ DSA</button>
    <button class="btn btn-ghost btn-full" onclick="location.href='webdev.html'">+ Dev log</button>
    <button class="btn btn-ghost btn-full" onclick="location.href='interview.html'">+ Application</button>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<script src="app.js"></script>
<script>
initDrawer('index.html');
initTopbar('Progress');

let viewMode = 'day';
let offset = 0;
let periodChart = null;

function setView(v, el) {
  viewMode = v; offset = 0;
  document.querySelectorAll('.view-tab').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  document.getElementById('day-details').style.display = v === 'day' ? 'block' : 'none';
  render();
}

function nav(dir) {
  offset += dir;
  if (offset > 0) offset = 0;
  document.getElementById('btn-fwd').disabled = offset >= 0;
  render();
}

function getPeriod() {
  const today = D.today();
  if (viewMode === 'day') {
    const d = new Date(today + 'T00:00:00');
    d.setDate(d.getDate() + offset);
    const iso = d.toISOString().slice(0, 10);
    return { type:'day', dates:[iso], label: offset===0 ? 'Today' : D.fmtFull(iso), sub:'' };
  }
  if (viewMode === 'week') {
    const dates = D.weekDates(offset);
    return { type:'week', dates: dates.filter(d=>d<=today), label: D.fmt(dates[0])+'–'+D.fmt(dates[6]), sub:'Week' };
  }
  if (viewMode === 'month') {
    const now = new Date(); now.setDate(1); now.setMonth(now.getMonth() + offset);
    const y=now.getFullYear(), m=now.getMonth();
    const days=new Date(y,m+1,0).getDate();
    const dates=Array.from({length:days},(_,i)=>{const d=new Date(y,m,i+1);return d.toISOString().slice(0,10);}).filter(d=>d<=today);
    return { type:'month', dates, label: now.toLocaleDateString('en-IN',{month:'long',year:'numeric'}), sub:'Month' };
  }
  if (viewMode === 'year') {
    const y = new Date().getFullYear() + offset;
    const months = [];
    for (let m=0; m<12; m++) {
      const d = new Date(y, m, 1);
      if (d.toISOString().slice(0,10) <= today) months.push(d.toISOString().slice(0,7));
    }
    return { type:'year', dates: months, label: y.toString(), sub:'Year' };
  }
}

const VERDICTS = [[90,'Exceptional'],[75,'Strong'],[60,'Decent'],[40,'Moderate'],[0,'Needs work']];
function getVerdict(pct) {
  for (const [k,v] of VERDICTS) if (pct >= k) return v;
  return 'Needs work';
}

function render() {
  const period = getPeriod();
  const today = D.today();

  document.getElementById('nav-label').textContent = period.label;
  document.getElementById('nav-sub').textContent = period.sub;
  document.getElementById('btn-fwd').disabled = offset >= 0;

  const dayNum = D.daysSince(APP.startDate) + 1;
  document.getElementById('day-label').textContent = 'DAY ' + dayNum + ' · OPERATION BUILD MYSELF';
  document.getElementById('phase-label').textContent = DB.get('aos_phase', APP.phase);
  const h = new Date().getHours();
  document.getElementById('greeting').textContent = h<12 ? 'Good morning.' : h<17 ? 'Good afternoon.' : 'Good evening.';

  if (viewMode === 'day') {
    renderDay(period.dates[0] || today);
  } else {
    renderPeriod(period);
  }
}

function renderDay(dateKey) {
  const hs = getTodayHabitScore(dateKey);
  const dsa = getDSAStats(dateKey);
  const web = DB.get(DB.keys.webdev, []).filter(l => l.date === dateKey).length;
  const score = Math.round(hs.pct * 0.5 + Math.min(dsa.today * 25, 25) + (web > 0 ? 25 : 0));

  document.getElementById('overall-score').textContent = score + '%';
  document.getElementById('overall-bar').style.width = score + '%';
  document.getElementById('score-period-lbl').textContent = dateKey === D.today() ? 'TODAY' : D.fmtFull(dateKey).toUpperCase();
  document.getElementById('score-detail').textContent = 'habits ' + hs.done + '/' + hs.total + ' · dsa ' + dsa.today + ' · dev ' + web;
  const badge = document.getElementById('score-badge');
  badge.textContent = getVerdict(score);
  badge.className = 'badge ' + (score>=75?'badge-green':score>=50?'badge-amber':'badge-gray');

  document.getElementById('p-habits').textContent = hs.done + '/' + hs.total;
  document.getElementById('pb-habits').style.width = hs.pct + '%';
  document.getElementById('p-dsa').textContent = dsa.today;
  document.getElementById('p-dsa-sub').textContent = 'total: ' + dsa.total;
  document.getElementById('p-webdev').textContent = web ? 'logged' : '—';
  document.getElementById('p-webdev-sub').textContent = '';
  const iv = getInterviewStats();
  document.getElementById('p-interview').textContent = iv.total;
  document.getElementById('p-interview-sub').textContent = iv.inProgress + ' active';

  // habits list
  const habitsData = DB.get(DB.keys.habits, {});
  const habits = getActiveHabits();
  document.getElementById('habits-today-list').innerHTML = habits.map(h => {
    const done = !!(habitsData[dateKey] && habitsData[dateKey][h.id]);
    return '<div class="row-between" style="padding:6px 0;border-bottom:1px solid var(--border);">' +
      '<span style="font-size:13px;">' + h.name + '</span>' +
      '<div style="width:14px;height:14px;border-radius:3px;background:' + (done?'var(--green)':'var(--bg3)') + ';"></div></div>';
  }).join('');

  // checkin
  const logs = DB.get(DB.keys.checkin, []);
  const log = logs.find(l => l.date === dateKey) || logs[0];
  const ci = document.getElementById('last-checkin');
  if (log) {
    ci.innerHTML = '<div class="row-between" style="margin-bottom:8px;"><span style="font-size:12px;font-family:var(--mono);color:var(--text2);">' + D.fmtFull(log.date) + '</span><span class="badge badge-accent">' + log.score + '/' + habits.length + '</span></div>' +
      (log.win ? '<div style="font-size:12px;margin-bottom:3px;"><span style="color:var(--green);font-family:var(--mono);font-size:10px;">WIN  </span>' + log.win + '</div>' : '') +
      (log.tmrw ? '<div style="font-size:12px;"><span style="color:var(--accent);font-family:var(--mono);font-size:10px;">TMR  </span>' + log.tmrw + '</div>' : '');
  } else {
    ci.innerHTML = '<div class="empty">No check-in for this day.</div>';
  }

  // dsa
  document.getElementById('dsa-breakdown').innerHTML = [
    {l:'TOTAL',v:dsa.total,c:'var(--accent)'},
    {l:'DONE',v:dsa.done,c:'var(--green)'},
    {l:'RETRY',v:dsa.retry,c:'var(--amber)'},
    {l:'WATCHED',v:dsa.watched,c:'var(--text3)'},
  ].map(s => '<div style="text-align:center;"><div style="font-size:18px;font-weight:700;color:'+s.c+';">'+s.v+'</div><div style="font-size:9px;color:var(--text3);font-family:var(--mono);margin-top:2px;">'+s.l+'</div></div>').join('');

  // interview
  const apps = DB.get(DB.keys.interview, []);
  const active = apps.filter(a => !['offer','rejected','ghosted'].includes(a.status)).slice(0, 3);
  const pip = document.getElementById('interview-pipeline');
  const statusColor = {applied:'badge-gray',screening:'badge-accent',r1:'badge-amber',r2:'badge-amber',r3:'badge-amber',offer:'badge-green',rejected:'badge-red'};
  pip.innerHTML = active.length ? active.map(a =>
    '<div class="row-between" style="padding:7px 0;border-bottom:1px solid var(--border);">' +
    '<div><div style="font-size:13px;font-weight:500;">' + a.company + '</div>' +
    '<div style="font-size:11px;color:var(--text3);font-family:var(--mono);">' + (a.role||'—') + '</div></div>' +
    '<span class="badge ' + (statusColor[a.status]||'badge-gray') + '">' + a.status + '</span></div>'
  ).join('') : '<div class="empty">No active applications.</div>';

  // chart
  const last14 = [];
  for (let i = 13; i >= 0; i--) {
    const d = new Date(dateKey + 'T00:00:00'); d.setDate(d.getDate() - i);
    const iso = d.toISOString().slice(0,10);
    if (iso <= D.today()) last14.push(iso);
  }
  if (periodChart) { periodChart.destroy(); periodChart = null; }
  periodChart = sparkLine(
    document.getElementById('chart-period').getContext('2d'),
    last14.map(d => D.fmt(d)),
    [{data: last14.map(d => getDayOverallScore(d)), label:'Score', color:'#4fc3f7'}]
  );
  document.getElementById('chart-label').textContent = 'Score — last 14 days';

  renderSpirals();
}

function renderPeriod(period) {
  const dates = period.dates;
  if (!dates.length) { document.getElementById('overall-score').textContent = '—'; return; }

  if (viewMode === 'year') {
    const monthScores = dates.map(ym => {
      const y = parseInt(ym.slice(0,4)), m = parseInt(ym.slice(5,7)) - 1;
      const daysInMonth = new Date(y, m+1, 0).getDate();
      const dts = [];
      for (let i = 1; i <= daysInMonth; i++) {
        const iso = ym + '-' + String(i).padStart(2,'0');
        if (iso <= D.today()) dts.push(iso);
      }
      const avg = dts.length ? Math.round(dts.reduce((a,d) => a + getDayOverallScore(d), 0) / dts.length) : 0;
      return { label: new Date(ym+'-01T00:00:00').toLocaleDateString('en-IN',{month:'short'}), score: avg };
    });
    const avg = monthScores.length ? Math.round(monthScores.reduce((a,s) => a+s.score, 0) / monthScores.length) : 0;
    document.getElementById('overall-score').textContent = avg + '%';
    document.getElementById('overall-bar').style.width = avg + '%';
    document.getElementById('score-period-lbl').textContent = period.label.toUpperCase();
    document.getElementById('score-detail').textContent = monthScores.length + ' months tracked';
    document.getElementById('score-badge').textContent = getVerdict(avg);
    document.getElementById('score-badge').className = 'badge ' + (avg>=75?'badge-green':avg>=50?'badge-amber':'badge-gray');
    if (periodChart) { periodChart.destroy(); periodChart = null; }
    periodChart = sparkBar(document.getElementById('chart-period').getContext('2d'), monthScores.map(s=>s.label), monthScores.map(s=>s.score), '#4fc3f7');
    document.getElementById('chart-label').textContent = 'Monthly average score';
  } else {
    const scores = dates.map(d => getDayOverallScore(d));
    const avg = scores.length ? Math.round(scores.reduce((a,s)=>a+s,0) / scores.length) : 0;
    const hPcts = dates.map(d => getTodayHabitScore(d).pct);
    const avgH = hPcts.length ? Math.round(hPcts.reduce((a,s)=>a+s,0) / hPcts.length) : 0;
    const dsaTotal = dates.reduce((a,d) => a + getDSAStats(d).today, 0);

    document.getElementById('overall-score').textContent = avg + '%';
    document.getElementById('overall-bar').style.width = avg + '%';
    document.getElementById('score-period-lbl').textContent = period.sub.toUpperCase() + ' AVG';
    document.getElementById('score-detail').textContent = 'avg habits ' + avgH + '% · dsa ' + dsaTotal + ' solved';
    document.getElementById('score-badge').textContent = getVerdict(avg);
    document.getElementById('score-badge').className = 'badge ' + (avg>=75?'badge-green':avg>=50?'badge-amber':'badge-gray');

    document.getElementById('p-habits').textContent = avgH + '%';
    document.getElementById('pb-habits').style.width = avgH + '%';
    document.getElementById('p-dsa').textContent = dsaTotal;
    document.getElementById('p-dsa-sub').textContent = 'total this period';
    const webCount = DB.get(DB.keys.webdev,[]).filter(l => dates.includes(l.date)).length;
    document.getElementById('p-webdev').textContent = webCount;
    document.getElementById('p-webdev-sub').textContent = 'logs';
    const iv = getInterviewStats();
    document.getElementById('p-interview').textContent = iv.total;
    document.getElementById('p-interview-sub').textContent = iv.inProgress + ' active';

    const step = viewMode==='month' && dates.length>14 ? Math.ceil(dates.length/14) : 1;
    const cd = dates.filter((_,i) => i%step===0);
    if (periodChart) { periodChart.destroy(); periodChart = null; }
    periodChart = sparkLine(
      document.getElementById('chart-period').getContext('2d'),
      cd.map(d => D.fmt(d)),
      [{data:cd.map(d=>getDayOverallScore(d)),label:'Overall',color:'#4fc3f7'},{data:cd.map(d=>getTodayHabitScore(d).pct),label:'Habits',color:'#4caf7d'}]
    );
    document.getElementById('chart-label').textContent = 'Score breakdown over period';
  }
  renderSpirals();
}

function renderSpirals() {
  const today = D.today();
  const overallScores = [], habitScores = [];
  let d = APP.startDate;
  // Safety: cap at 2 years of days to prevent infinite loop
  let guard = 0;
  while (d <= today && guard < 730) {
    overallScores.push(getDayOverallScore(d));
    habitScores.push(getTodayHabitScore(d).pct);
    d = D.addDays(d, 1);
    guard++;
  }

  // Use requestAnimationFrame so DOM is fully painted before we measure canvas width
  requestAnimationFrame(() => {
    const c1 = document.getElementById('spiral-overall');
    const c2 = document.getElementById('spiral-habits');
    // Force a minimum size if offsetWidth is 0 (e.g. hidden/not yet laid out)
    const sz = Math.max(c1.parentElement.offsetWidth - 24, 100);
    c1.style.width = sz + 'px'; c1.style.height = sz + 'px';
    c2.style.width = sz + 'px'; c2.style.height = sz + 'px';
    drawSpiral(c1, overallScores, {label:'overall', color:'#4fc3f7', maxVal:100});
    drawSpiral(c2, habitScores,  {label:'habits',  color:'#4caf7d', maxVal:100});
  });
}

render();
</script>
</body>
</html>
