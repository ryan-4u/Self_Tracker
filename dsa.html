<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="theme-color" content="#0a0a0a">
<title>DSA · Aaryan OS</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="topbar"></div>

<!-- ADD MODAL -->
<div class="modal-bg" id="modal-add">
  <div class="modal">
    <div class="modal-title">
      Add problem
      <button class="modal-close" onclick="closeModal('modal-add')">×</button>
    </div>
    <div class="field"><label>Problem name / title</label><input type="text" id="m-title" placeholder="e.g. Two Sum"></div>
    <div class="field"><label>Topic</label>
      <select id="m-topic">
        <option value="">Select topic</option>
        <option>Arrays</option><option>Strings</option><option>Linked List</option>
        <option>Stack</option><option>Queue</option><option>Trees</option>
        <option>Graph</option><option>DP</option><option>Greedy</option>
        <option>Binary Search</option><option>Recursion</option><option>Hashing</option>
        <option>Sorting</option><option>Bit Manipulation</option><option>Two Pointers</option>
        <option>Sliding Window</option><option>Other</option>
      </select>
    </div>
    <div class="field"><label>Difficulty</label>
      <select id="m-diff">
        <option value="easy">Easy</option>
        <option value="medium" selected>Medium</option>
        <option value="hard">Hard</option>
      </select>
    </div>
    <div class="field"><label>Status</label>
      <select id="m-status">
        <option value="done">Done in one go</option>
        <option value="no-help">Done without help</option>
        <option value="hint">Done with hint — retry later</option>
        <option value="watched">Watched solution</option>
        <option value="retry">Need to retry</option>
      </select>
    </div>
    <div class="field"><label>Platform link (optional)</label><input type="url" id="m-link" placeholder="https://leetcode.com/..."></div>
    <div class="field"><label>Time spent (minutes)</label><input type="number" id="m-time" placeholder="30" min="1"></div>
    <div class="field"><label>Notes (optional)</label><textarea id="m-notes" rows="2" placeholder="Key insight, approach used..."></textarea></div>
    <button class="btn btn-primary btn-full" onclick="addProblem()" style="margin-top:4px;">Save problem</button>
  </div>
</div>

<div class="page fade-in">

  <!-- STATS -->
  <p class="sec-label">Overview</p>
  <div class="stat-grid">
    <div class="stat-block"><div class="stat-val" id="s-total">0</div><div class="stat-lbl">Total</div></div>
    <div class="stat-block"><div class="stat-val" id="s-today">0</div><div class="stat-lbl">Today</div></div>
    <div class="stat-block"><div class="stat-val" id="s-streak">0</div><div class="stat-lbl">Day streak</div></div>
    <div class="stat-block"><div class="stat-val" id="s-time">0h</div><div class="stat-lbl">Time spent</div></div>
  </div>

  <!-- STATUS BREAKDOWN -->
  <p class="sec-label">Status breakdown</p>
  <div class="card" style="display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:8px;" id="status-grid"></div>

  <!-- CHART: daily problems -->
  <p class="sec-label">Problems per day (last 14 days)</p>
  <div class="card"><div class="chart-wrap"><canvas id="chart-daily"></canvas></div></div>

  <!-- TOPIC BREAKDOWN -->
  <p class="sec-label">By topic</p>
  <div class="card" id="topic-bars"></div>

  <!-- FILTER + ADD -->
  <p class="sec-label" style="display:flex;align-items:center;justify-content:space-between;">
    <span>Problem sheet</span>
    <button class="btn btn-primary btn-sm" onclick="openModal('modal-add')">+ Add</button>
  </p>

  <!-- FILTERS -->
  <div class="row" style="gap:6px;margin-bottom:10px;flex-wrap:wrap;">
    <button class="btn btn-ghost btn-sm" id="f-all" onclick="setFilter('all')">All</button>
    <button class="btn btn-ghost btn-sm" id="f-done" onclick="setFilter('done')">Done</button>
    <button class="btn btn-ghost btn-sm" id="f-retry" onclick="setFilter('retry')">Retry</button>
    <button class="btn btn-ghost btn-sm" id="f-hint" onclick="setFilter('hint')">Hint</button>
    <button class="btn btn-ghost btn-sm" id="f-watched" onclick="setFilter('watched')">Watched</button>
  </div>

  <div id="problem-list" style="padding-bottom:32px;"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<script src="app.js"></script>
<script>
initDrawer('dsa.html');
initTopbar('DSA Tracker');

let activeFilter = 'all';
let dailyChart = null;

const STATUS_META = {
  'done':     { label: 'Done — one go',      color: 'var(--green)',  badge: 'badge-green'  },
  'no-help':  { label: 'Done — no help',     color: 'var(--green)',  badge: 'badge-green'  },
  'hint':     { label: 'Done with hint',     color: 'var(--amber)',  badge: 'badge-amber'  },
  'watched':  { label: 'Watched solution',   color: 'var(--text3)',  badge: 'badge-gray'   },
  'retry':    { label: 'Retry needed',       color: 'var(--red)',    badge: 'badge-red'    },
};
const DIFF_BADGE = { easy: 'badge-green', medium: 'badge-amber', hard: 'badge-red' };

function getProblems() { return DB.get(DB.keys.dsa, []); }
function saveProblems(p) { DB.set(DB.keys.dsa, p); }

function addProblem() {
  const title = document.getElementById('m-title').value.trim();
  if (!title) { toast('Enter problem title'); return; }
  const problems = getProblems();
  problems.unshift({
    id: Date.now(),
    date: D.today(),
    title,
    topic: document.getElementById('m-topic').value,
    diff: document.getElementById('m-diff').value,
    status: document.getElementById('m-status').value,
    link: document.getElementById('m-link').value.trim(),
    time: parseInt(document.getElementById('m-time').value) || 0,
    notes: document.getElementById('m-notes').value.trim(),
  });
  saveProblems(problems);
  closeModal('modal-add');
  ['m-title','m-link','m-time','m-notes'].forEach(id => document.getElementById(id).value = '');
  toast('Problem saved'); render();
}

function deleteProblem(id) {
  if (!confirm('Delete this problem?')) return;
  saveProblems(getProblems().filter(p => p.id !== id));
  render();
}

function setFilter(f) {
  activeFilter = f;
  ['all','done','retry','hint','watched'].forEach(x => {
    document.getElementById('f-' + x).classList.toggle('btn-primary', x === f);
    document.getElementById('f-' + x).classList.toggle('btn-ghost', x !== f);
  });
  renderList();
}

function getDSAStreak() {
  const problems = getProblems();
  const daysWithProblems = [...new Set(problems.map(p => p.date))].sort().reverse();
  let streak = 0;
  const today = D.today();
  let expected = today;
  for (const d of daysWithProblems) {
    if (d === expected) { streak++; const dt = new Date(d); dt.setDate(dt.getDate()-1); expected = dt.toISOString().slice(0,10); }
    else if (d < expected) break;
  }
  return streak;
}

function render() {
  const problems = getProblems();
  const today = D.today();
  const todayProbs = problems.filter(p => p.date === today);
  const totalTime = problems.reduce((a, p) => a + (p.time || 0), 0);

  document.getElementById('s-total').textContent = problems.length;
  document.getElementById('s-today').textContent = todayProbs.length;
  document.getElementById('s-streak').textContent = getDSAStreak();
  document.getElementById('s-time').textContent = Math.round(totalTime / 60) + 'h';

  // status grid
  const statusCounts = {};
  problems.forEach(p => { statusCounts[p.status] = (statusCounts[p.status] || 0) + 1; });
  document.getElementById('status-grid').innerHTML = Object.entries(STATUS_META).map(([k, v]) =>
    `<div class="card-sm" style="text-align:center;">
      <div style="font-size:20px;font-weight:700;color:${v.color};">${statusCounts[k] || 0}</div>
      <div style="font-size:10px;color:var(--text3);font-family:var(--mono);margin-top:3px;">${k.toUpperCase()}</div>
    </div>`).join('');

  // daily chart (14 days)
  const last14 = Array.from({length:14}, (_,i) => {
    const d = new Date(); d.setHours(0,0,0,0); d.setDate(d.getDate() - (13 - i));
    return d.toISOString().slice(0,10);
  });
  if (dailyChart) dailyChart.destroy();
  dailyChart = sparkBar(
    document.getElementById('chart-daily').getContext('2d'),
    last14.map(d => D.fmt(d)),
    last14.map(d => problems.filter(p => p.date === d).length),
    '#4fc3f7'
  );

  // topic bars
  const topicCounts = {};
  problems.forEach(p => { if (p.topic) topicCounts[p.topic] = (topicCounts[p.topic] || 0) + 1; });
  const sorted = Object.entries(topicCounts).sort((a,b) => b[1]-a[1]);
  const maxT = sorted[0]?.[1] || 1;
  document.getElementById('topic-bars').innerHTML = sorted.length ? sorted.map(([topic, count]) =>
    `<div class="row-between" style="padding:5px 0;border-bottom:1px solid var(--border);">
      <div style="font-size:12px;width:110px;flex-shrink:0;">${topic}</div>
      <div style="flex:1;margin:0 10px;"><div class="prog-track"><div class="prog-fill" style="width:${Math.round(count/maxT*100)}%;"></div></div></div>
      <div style="font-size:11px;font-family:var(--mono);color:var(--text3);width:20px;text-align:right;">${count}</div>
    </div>`).join('') : '<div class="empty">No problems yet.</div>';

  renderList();
}

function renderList() {
  const problems = getProblems();
  const filtered = activeFilter === 'all' ? problems : problems.filter(p => p.status === activeFilter || (activeFilter === 'done' && p.status === 'no-help'));
  const el = document.getElementById('problem-list');
  if (!filtered.length) { el.innerHTML = '<div class="empty">No problems here.</div>'; return; }
  el.innerHTML = filtered.map(p => {
    const sm = STATUS_META[p.status] || STATUS_META['done'];
    return `<div class="card" style="margin-bottom:8px;">
      <div class="row-between" style="margin-bottom:6px;">
        <div style="font-weight:600;font-size:14px;flex:1;margin-right:8px;">${p.title}</div>
        <span class="badge ${sm.badge}" style="flex-shrink:0;">${p.status}</span>
      </div>
      <div class="row" style="gap:8px;flex-wrap:wrap;margin-bottom:6px;">
        ${p.topic ? `<span class="badge badge-gray">${p.topic}</span>` : ''}
        ${p.diff ? `<span class="badge ${DIFF_BADGE[p.diff] || 'badge-gray'}">${p.diff}</span>` : ''}
        ${p.time ? `<span class="badge badge-gray">${p.time}m</span>` : ''}
        <span style="font-size:11px;color:var(--text3);font-family:var(--mono);">${D.fmt(p.date)}</span>
      </div>
      ${p.notes ? `<div style="font-size:12px;color:var(--text2);margin-bottom:6px;line-height:1.5;">${p.notes}</div>` : ''}
      <div class="row-between">
        ${p.link ? `<a href="${p.link}" target="_blank" style="font-size:11px;color:var(--accent);font-family:var(--mono);">Open problem ↗</a>` : '<span></span>'}
        <button class="btn btn-danger btn-sm" onclick="deleteProblem(${p.id})">Delete</button>
      </div>
    </div>`;
  }).join('');
}

render();
setFilter('all');
</script>
</body>
</html>
