<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="theme-color" content="#0a0a0a">
<title>DSA · Aaryan OS</title>
<link rel="stylesheet" href="style.css">
<style>
.topic-tag { display:inline-flex;align-items:center;padding:3px 8px;border-radius:99px;font-size:11px;background:var(--accent-dim);color:var(--accent);font-family:var(--mono);margin:2px;cursor:pointer;border:1px solid transparent;transition:all .15s; }
.topic-tag.sel { background:var(--accent);color:#000;border-color:var(--accent); }
.star-btn { font-size:20px;cursor:pointer;color:var(--text3);transition:color .1s;line-height:1;padding:0 1px;background:none;border:none; }
.star-btn.lit { color:#f0a030; }
.sf-btn { padding:5px 10px;border:1px solid var(--border);border-radius:var(--radius);background:none;color:var(--text3);font-size:13px;cursor:pointer;font-family:var(--mono);transition:all .15s; }
.sf-btn.active { border-color:#f0a030;color:#f0a030;background:rgba(240,160,48,0.1); }
</style>
</head>
<body>
<div class="topbar"></div>

<div class="modal-bg" id="modal-add">
  <div class="modal">
    <div class="modal-title">Add problem <button class="modal-close" onclick="closeModal('modal-add')">×</button></div>
    <div class="field"><label>Problem name / title</label><input type="text" id="m-title" placeholder="e.g. Two Sum, Merge K Lists..."></div>
    <div class="field">
      <label>Topics (tap multiple)</label>
      <div id="topic-select" style="display:flex;flex-wrap:wrap;gap:4px;margin-top:4px;"></div>
    </div>
    <div class="field"><label>Difficulty</label>
      <select id="m-diff">
        <option value="easy">Easy</option><option value="medium" selected>Medium</option><option value="hard">Hard</option>
      </select>
    </div>
    <div class="field"><label>Status</label>
      <select id="m-status">
        <option value="done">Done in one go</option>
        <option value="no-help">Done without help</option>
        <option value="hint">Done with hint — retry later</option>
        <option value="watched">Watched solution</option>
        <option value="retry">Need to retry</option>
      </select>
    </div>
    <div class="field">
      <label>Stars (rate difficulty / quality)</label>
      <div id="m-stars-input" style="display:flex;gap:4px;margin-top:4px;"></div>
    </div>
    <div class="field"><label>Platform link (optional)</label><input type="url" id="m-link" placeholder="https://leetcode.com/..."></div>
    <div class="field"><label>Time spent (minutes)</label><input type="number" id="m-time" placeholder="30"></div>
    <div class="field"><label>Notes</label><textarea id="m-notes" rows="2" placeholder="Key insight, approach..."></textarea></div>
    <button class="btn btn-primary btn-full" onclick="addProblem()">Save problem</button>
  </div>
</div>

<div class="page fade-in">

  <div class="stat-grid">
    <div class="stat-block"><div class="stat-val" id="s-total">0</div><div class="stat-lbl">Total</div></div>
    <div class="stat-block"><div class="stat-val" id="s-today">0</div><div class="stat-lbl">Today</div></div>
    <div class="stat-block"><div class="stat-val" id="s-streak">0</div><div class="stat-lbl">Streak</div></div>
    <div class="stat-block"><div class="stat-val" id="s-time">0h</div><div class="stat-lbl">Time</div></div>
  </div>

  <p class="sec-label">Status breakdown</p>
  <div class="card" style="display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:8px;" id="status-grid"></div>

  <p class="sec-label">Problems per day (last 14)</p>
  <div class="card"><div class="chart-wrap"><canvas id="chart-daily"></canvas></div></div>

  <p class="sec-label">By topic</p>
  <div class="card" id="topic-bars"></div>

  <p class="sec-label" style="display:flex;align-items:center;justify-content:space-between;">
    <span>Problem sheet</span>
    <button class="btn btn-primary btn-sm" onclick="openModal('modal-add')">+ Add</button>
  </p>

  <!-- STATUS FILTERS -->
  <div style="display:flex;gap:5px;margin-bottom:8px;flex-wrap:wrap;" id="status-filter-row"></div>

  <!-- STAR FILTERS -->
  <div style="display:flex;gap:5px;margin-bottom:8px;flex-wrap:wrap;align-items:center;" id="star-filter-row"></div>

  <!-- TOPIC FILTERS -->
  <div id="topic-filter-row" style="display:flex;flex-wrap:wrap;gap:4px;margin-bottom:10px;"></div>

  <div id="problem-list" style="padding-bottom:32px;"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<script src="app.js"></script>
<script>
initDrawer('dsa.html');
initTopbar('DSA Tracker');

const ALL_TOPICS = ['Arrays','Strings','Linked List','Stack','Queue','Trees','Graphs','DP','Greedy','Binary Search','Recursion','Hashing','Sorting','Bit Manipulation','Two Pointers','Sliding Window','Math','Heap','Trie','Backtracking','Divide & Conquer','Other'];
let selectedTopics = [];
let filterStatus = 'all', filterStar = 0, filterTopic = '';
let dailyChart = null;
let starRating = 0;

const STATUS_META = {
  'done':    {label:'Done one go',  color:'var(--green)',  badge:'badge-green'},
  'no-help': {label:'No help',      color:'var(--green)',  badge:'badge-green'},
  'hint':    {label:'With hint',    color:'var(--amber)',  badge:'badge-amber'},
  'watched': {label:'Watched',      color:'var(--text3)',  badge:'badge-gray'},
  'retry':   {label:'Retry',        color:'var(--red)',    badge:'badge-red'},
};
const DIFF_BADGE = {easy:'badge-green', medium:'badge-amber', hard:'badge-red'};

function getProblems() { return DB.get(DB.keys.dsa, []); }
function saveProblems(p) { DB.set(DB.keys.dsa, p); }

// ── BUILD STAR INPUT ──
function buildStarInput(containerId, current, onClickFn) {
  const container = document.getElementById(containerId);
  if (!container) return;
  container.innerHTML = '';
  for (let i = 1; i <= 5; i++) {
    const btn = document.createElement('button');
    btn.type = 'button';
    btn.className = 'star-btn' + (i <= current ? ' lit' : '');
    btn.textContent = '★';
    btn.onclick = () => onClickFn(i);
    container.appendChild(btn);
  }
}

function setStar(n) {
  starRating = n;
  buildStarInput('m-stars-input', n, setStar);
}

// ── BUILD STATUS FILTER ROW ──
function buildStatusFilterRow() {
  const statuses = ['all','done','retry','hint','watched'];
  const labels = {all:'All', done:'Done', retry:'Retry', hint:'Hint', watched:'Watched'};
  const row = document.getElementById('status-filter-row');
  row.innerHTML = '';
  statuses.forEach(s => {
    const btn = document.createElement('button');
    btn.id = 'f-' + s;
    btn.className = 'btn ' + (s === filterStatus ? 'btn-primary' : 'btn-ghost') + ' btn-sm';
    btn.textContent = labels[s];
    btn.onclick = () => setStatusFilter(s);
    row.appendChild(btn);
  });
}

// ── BUILD STAR FILTER ROW ──
function buildStarFilterRow() {
  const row = document.getElementById('star-filter-row');
  row.innerHTML = '';

  const lbl = document.createElement('span');
  lbl.style.cssText = 'font-size:10px;font-family:var(--mono);color:var(--text3);';
  lbl.textContent = 'STARS:';
  row.appendChild(lbl);

  // "All" button
  const allBtn = document.createElement('button');
  allBtn.className = 'sf-btn' + (filterStar === 0 ? ' active' : '');
  allBtn.textContent = 'All';
  allBtn.onclick = () => setStarFilter(0);
  row.appendChild(allBtn);

  // 1–5 star buttons
  for (let n = 1; n <= 5; n++) {
    const btn = document.createElement('button');
    btn.className = 'sf-btn' + (filterStar === n ? ' active' : '');
    btn.textContent = '★'.repeat(n);
    btn.onclick = () => setStarFilter(n);
    row.appendChild(btn);
  }
}

// ── BUILD TOPIC SELECT IN MODAL ──
function buildTopicSelect() {
  const el = document.getElementById('topic-select');
  el.innerHTML = '';
  ALL_TOPICS.forEach(t => {
    const span = document.createElement('span');
    span.className = 'topic-tag' + (selectedTopics.includes(t) ? ' sel' : '');
    span.textContent = t;
    span.onclick = () => toggleTopic(t, span);
    el.appendChild(span);
  });
}

function toggleTopic(t, el) {
  const idx = selectedTopics.indexOf(t);
  if (idx >= 0) { selectedTopics.splice(idx, 1); el.classList.remove('sel'); }
  else { selectedTopics.push(t); el.classList.add('sel'); }
}

function setStatusFilter(val) {
  filterStatus = val;
  buildStatusFilterRow();
  renderList();
}

function setStarFilter(n) {
  filterStar = n;
  buildStarFilterRow();
  renderList();
}

function setTopicFilter(t) {
  filterTopic = filterTopic === t ? '' : t;
  renderTopicFilterRow();
  renderList();
}

// ── ADD PROBLEM ──
function addProblem() {
  const title = document.getElementById('m-title').value.trim();
  if (!title) { toast('Enter problem title'); return; }
  if (!selectedTopics.length) { toast('Select at least one topic'); return; }
  const problems = getProblems();
  problems.unshift({
    id: Date.now(),
    date: D.today(),
    title,
    topics: [...selectedTopics],
    diff: document.getElementById('m-diff').value,
    status: document.getElementById('m-status').value,
    stars: starRating,
    link: document.getElementById('m-link').value.trim(),
    time: parseInt(document.getElementById('m-time').value) || 0,
    notes: document.getElementById('m-notes').value.trim(),
  });
  saveProblems(problems);
  closeModal('modal-add');
  selectedTopics = []; starRating = 0;
  ['m-title','m-link','m-time','m-notes'].forEach(id => document.getElementById(id).value = '');
  buildTopicSelect();
  buildStarInput('m-stars-input', 0, setStar);
  toast('Problem saved');
  render();
}

function deleteProblem(id) {
  if (!confirm('Delete?')) return;
  saveProblems(getProblems().filter(p => p.id !== id));
  render();
}

// Inline star update on saved problems
function updateStar(id, n) {
  const problems = getProblems();
  const p = problems.find(x => x.id === id);
  if (p) { p.stars = n; saveProblems(problems); renderList(); }
}

function getDSAStreak() {
  const problems = getProblems();
  const days = [...new Set(problems.map(p => p.date))].sort().reverse();
  let streak = 0, expected = D.today();
  for (const d of days) {
    if (d === expected) {
      streak++;
      const dt = new Date(d + 'T00:00:00'); dt.setDate(dt.getDate()-1);
      expected = dt.toISOString().slice(0,10);
    } else if (d < expected) break;
  }
  return streak;
}

function renderTopicFilterRow() {
  const problems = getProblems();
  const topicCounts = {};
  problems.forEach(p => (p.topics || (p.topic ? [p.topic] : [])).forEach(t => {
    topicCounts[t] = (topicCounts[t] || 0) + 1;
  }));
  const topics = Object.keys(topicCounts).sort((a,b) => topicCounts[b] - topicCounts[a]);
  const row = document.getElementById('topic-filter-row');
  row.innerHTML = '';

  const makeBtn = (label, val, count) => {
    const btn = document.createElement('button');
    const isActive = filterTopic === val;
    btn.style.cssText = 'font-size:11px;padding:3px 8px;border-radius:99px;border:1px solid ' + (isActive?'var(--accent)':'var(--border)') + ';background:' + (isActive?'var(--accent-dim)':'none') + ';color:' + (isActive?'var(--accent)':'var(--text3)') + ';cursor:pointer;font-family:var(--mono);';
    btn.textContent = label + (count ? ' ' + count : '');
    btn.onclick = () => setTopicFilter(val);
    row.appendChild(btn);
  };
  makeBtn('All topics', '');
  topics.forEach(t => makeBtn(t, t, topicCounts[t]));
}

// Render inline stars for a problem card (clickable)
function renderStarRow(stars, problemId) {
  let html = '<div style="display:flex;gap:2px;margin:4px 0;">';
  for (let i = 1; i <= 5; i++) {
    html += '<button type="button" class="star-btn' + (i <= (stars||0) ? ' lit' : '') + '" onclick="updateStar(' + problemId + ',' + i + ')">★</button>';
  }
  html += '</div>';
  return html;
}

function render() {
  const problems = getProblems();
  const today = D.today();
  const totalTime = problems.reduce((a,p) => a + (p.time||0), 0);

  document.getElementById('s-total').textContent = problems.length;
  document.getElementById('s-today').textContent = problems.filter(p => p.date === today).length;
  document.getElementById('s-streak').textContent = getDSAStreak();
  document.getElementById('s-time').textContent = Math.round(totalTime / 60) + 'h';

  // status grid
  const sc = {};
  problems.forEach(p => { sc[p.status] = (sc[p.status]||0) + 1; });
  document.getElementById('status-grid').innerHTML = Object.entries(STATUS_META).map(([k,v]) =>
    '<div class="card-sm" style="text-align:center;"><div style="font-size:20px;font-weight:700;color:'+v.color+';">'+(sc[k]||0)+'</div><div style="font-size:9px;color:var(--text3);font-family:var(--mono);margin-top:3px;">'+k.toUpperCase()+'</div></div>'
  ).join('');

  // daily chart
  const last14 = [];
  for (let i = 13; i >= 0; i--) {
    const d = new Date(); d.setHours(0,0,0,0); d.setDate(d.getDate()-i);
    last14.push(d.toISOString().slice(0,10));
  }
  if (dailyChart) { dailyChart.destroy(); dailyChart = null; }
  dailyChart = sparkBar(
    document.getElementById('chart-daily').getContext('2d'),
    last14.map(d => D.fmt(d)),
    last14.map(d => problems.filter(p => p.date === d).length),
    '#4fc3f7'
  );

  // topic bars
  const topicCounts = {};
  problems.forEach(p => (p.topics || (p.topic ? [p.topic] : [])).forEach(t => {
    topicCounts[t] = (topicCounts[t]||0) + 1;
  }));
  const sorted = Object.entries(topicCounts).sort((a,b) => b[1]-a[1]);
  const maxT = sorted[0]?.[1] || 1;
  document.getElementById('topic-bars').innerHTML = sorted.length ? sorted.map(([topic, count]) =>
    '<div class="row-between" style="padding:5px 0;border-bottom:1px solid var(--border);">' +
    '<div style="font-size:12px;width:110px;flex-shrink:0;">' + topic + '</div>' +
    '<div style="flex:1;margin:0 8px;"><div class="prog-track"><div class="prog-fill" style="width:'+Math.round(count/maxT*100)+'%;"></div></div></div>' +
    '<div style="font-size:11px;font-family:var(--mono);color:var(--text3);width:20px;text-align:right;">'+count+'</div></div>'
  ).join('') : '<div class="empty">No problems yet.</div>';

  buildStatusFilterRow();
  buildStarFilterRow();
  renderTopicFilterRow();
  renderList();
}

function renderList() {
  let problems = getProblems();

  if (filterStatus !== 'all') {
    problems = problems.filter(p =>
      p.status === filterStatus || (filterStatus === 'done' && p.status === 'no-help')
    );
  }
  if (filterStar > 0) problems = problems.filter(p => (p.stars||0) === filterStar);
  if (filterTopic) problems = problems.filter(p => (p.topics || (p.topic?[p.topic]:[])).includes(filterTopic));

  const el = document.getElementById('problem-list');
  if (!problems.length) { el.innerHTML = '<div class="empty">No problems match filters.</div>'; return; }

  el.innerHTML = problems.map(p => {
    const sm = STATUS_META[p.status] || STATUS_META['done'];
    const topics = (p.topics || (p.topic ? [p.topic] : [])).filter(Boolean);
    return '<div class="card" style="margin-bottom:8px;">' +
      '<div class="row-between" style="margin-bottom:6px;">' +
        '<div style="font-weight:600;font-size:14px;flex:1;margin-right:8px;">' + p.title + '</div>' +
        '<span class="badge ' + sm.badge + '" style="flex-shrink:0;">' + p.status + '</span>' +
      '</div>' +
      '<div style="display:flex;gap:5px;flex-wrap:wrap;margin-bottom:6px;">' +
        topics.map(t => '<span class="topic-tag" style="cursor:default;">' + t + '</span>').join('') +
        (p.diff ? '<span class="badge ' + (DIFF_BADGE[p.diff]||'badge-gray') + '">' + p.diff + '</span>' : '') +
        (p.time ? '<span class="badge badge-gray">' + p.time + 'm</span>' : '') +
        '<span style="font-size:11px;color:var(--text3);font-family:var(--mono);">' + D.fmt(p.date) + '</span>' +
      '</div>' +
      renderStarRow(p.stars||0, p.id) +
      (p.notes ? '<div style="font-size:12px;color:var(--text2);margin-top:6px;line-height:1.5;">' + p.notes + '</div>' : '') +
      '<div class="row-between" style="margin-top:8px;">' +
        (p.link ? '<a href="' + p.link + '" target="_blank" style="font-size:11px;color:var(--accent);font-family:var(--mono);">Open ↗</a>' : '<span></span>') +
        '<button class="btn btn-danger btn-sm" onclick="deleteProblem(' + p.id + ')">Delete</button>' +
      '</div></div>';
  }).join('');
}

// ── INIT ──
buildTopicSelect();
buildStarInput('m-stars-input', 0, setStar);
render();
</script>
</body>
</html>
