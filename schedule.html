<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="theme-color" content="#0a0a0a">
<title>Schedule · Aaryan OS</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="topbar"></div>
<div class="page fade-in">

  <!-- SCHEDULE BLOCKS -->
  <p class="sec-label">Your daily schedule</p>
  <div id="schedule-display"></div>

  <!-- TODAY FOLLOW LOG -->
  <p class="sec-label">Did you follow it today?</p>
  <div class="card">
    <div style="font-size:12px;color:var(--text3);font-family:var(--mono);margin-bottom:12px;" id="sched-date"></div>
    <div id="sched-follow"></div>
    <hr class="divider">
    <div class="field"><label>Notes — what actually happened today</label>
      <textarea id="sched-notes" rows="3" placeholder="Woke up at 6 instead of 5, skipped DSA in morning but did it evening..."></textarea>
    </div>
    <div class="field"><label>Schedule adherence</label>
      <div style="display:flex;gap:6px;">
        <button class="btn btn-ghost btn-sm" style="flex:1;" id="adh-low"  onclick="setAdh('low',this)">Poor</button>
        <button class="btn btn-ghost btn-sm" style="flex:1;" id="adh-mid"  onclick="setAdh('mid',this)">Partial</button>
        <button class="btn btn-ghost btn-sm" style="flex:1;" id="adh-high" onclick="setAdh('high',this)">Followed</button>
      </div>
    </div>
    <button class="btn btn-primary btn-full" onclick="saveSchedLog()">Save today's schedule log</button>
  </div>

  <!-- ANALYSIS -->
  <p class="sec-label">Adherence analysis (last 14 days)</p>
  <div class="card"><div class="chart-wrap"><canvas id="chart-adh"></canvas></div></div>

  <!-- LOG HISTORY -->
  <p class="sec-label">Schedule history</p>
  <div id="sched-history" style="padding-bottom:32px;"></div>

</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<script src="app.js"></script>
<script>
initDrawer('schedule.html');
initTopbar('Schedule');

let schedAdh = null;
let adhChart = null;

const SCHEDULE = [
  { time: '5:00',       label: 'Wake up',            sub: 'No phone for 30 min',            cat: 'body',      color: 'var(--amber)' },
  { time: '5:00–5:30',  label: 'Morning routine',    sub: '500ml water · eye drops · stretch', cat: 'body',   color: 'var(--amber)' },
  { time: '5:30–5:50',  label: 'Meditation / walk',  sub: 'Sunlight exposure',               cat: 'body',      color: 'var(--green)' },
  { time: '5:50–7:30',  label: 'DSA deep work',      sub: '1–2 problems · no music',         cat: 'skill',     color: 'var(--accent)' },
  { time: '7:30–9:00',  label: 'Morning prep',        sub: 'Breakfast · hygiene · debrief',  cat: 'body',      color: 'var(--amber)' },
  { time: '9:00–1:00',  label: 'College / internship',sub: 'CodeAlpha tasks · full output',  cat: 'work',      color: 'var(--purple)' },
  { time: '1:00–2:00',  label: 'Lunch + social',     sub: 'Present at college. No guilt.',   cat: 'social',    color: 'var(--text3)' },
  { time: '2:00–5:00',  label: 'Skill block',         sub: 'React · Tailwind · project build', cat: 'skill',  color: 'var(--accent)' },
  { time: '5:00–6:00',  label: 'Physical',            sub: 'Gym · walk · bodyweight',         cat: 'body',      color: 'var(--green)' },
  { time: '6:00–7:30',  label: 'DSA round 2',         sub: 'Revision · weak areas',           cat: 'skill',     color: 'var(--accent)' },
  { time: '7:30–8:30',  label: 'Dinner + learning',  sub: 'Book · podcast (30 min)',          cat: 'mind',      color: 'var(--purple)' },
  { time: '8:30–9:30',  label: 'Wind down',           sub: 'Nightly check-in · plan tomorrow',cat: 'mind',      color: 'var(--text2)' },
  { time: '9:30–10:00', label: 'Water + eye drops',  sub: '4–5L target · 3rd eye drop',      cat: 'body',      color: 'var(--green)' },
  { time: '10:00–10:30',label: 'Sleep',               sub: 'Phone down · lights off',         cat: 'body',      color: 'var(--text3)' },
];

document.getElementById('sched-date').textContent = new Date().toLocaleDateString('en-IN', { weekday: 'long', day: 'numeric', month: 'long' });

function renderSchedule() {
  document.getElementById('schedule-display').innerHTML = SCHEDULE.map((s, i) => `
    <div style="display:flex;gap:12px;margin-bottom:4px;align-items:stretch;">
      <div style="width:72px;flex-shrink:0;text-align:right;font-size:11px;font-family:var(--mono);color:var(--text3);padding-top:11px;">${s.time}</div>
      <div style="width:2px;background:var(--border);border-radius:99px;flex-shrink:0;position:relative;">
        <div style="width:8px;height:8px;border-radius:50%;background:${s.color};border:1px solid var(--bg);position:absolute;left:-3px;top:12px;"></div>
      </div>
      <div style="flex:1;background:var(--bg1);border:1px solid var(--border);border-radius:var(--radius);padding:10px 12px;margin-bottom:0;">
        <div style="font-size:13px;font-weight:500;">${s.label}</div>
        <div style="font-size:11px;color:var(--text3);font-family:var(--mono);margin-top:2px;">${s.sub}</div>
      </div>
    </div>`).join('');
}

function renderFollowBlocks() {
  const logs = DB.get(DB.keys.schedule, []);
  const today = D.today();
  const todayLog = logs.find(l => l.date === today);
  const todayBlocks = todayLog?.blocks || {};

  document.getElementById('sched-follow').innerHTML = SCHEDULE.map((s, i) => {
    const done = !!todayBlocks[i];
    return `<div onclick="toggleBlock(${i}, this)"
      style="display:flex;align-items:center;gap:10px;padding:8px;border-radius:var(--radius);margin-bottom:4px;cursor:pointer;background:${done?'rgba(76,175,125,0.1)':'var(--bg2)'};border:1px solid ${done?'var(--green)':'var(--border)'};">
      <div style="width:16px;height:16px;border-radius:4px;border:1px solid ${done?'var(--green)':'var(--border2)'};background:${done?'var(--green)':'transparent'};display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:11px;color:${done?'#000':'transparent'};">✓</div>
      <div style="flex:1;">
        <div style="font-size:12px;font-weight:500;color:${done?'var(--green)':'var(--text)'};">${s.label}</div>
        <div style="font-size:10px;font-family:var(--mono);color:var(--text3);">${s.time}</div>
      </div>
    </div>`;
  }).join('');

  // pre-fill notes/adherence if log exists
  if (todayLog) {
    document.getElementById('sched-notes').value = todayLog.notes || '';
    if (todayLog.adherence) setAdh(todayLog.adherence, document.getElementById('adh-' + todayLog.adherence));
  }
}

function toggleBlock(idx, row) {
  const logs = DB.get(DB.keys.schedule, []);
  const today = D.today();
  let log = logs.find(l => l.date === today);
  if (!log) { log = { date: today, blocks: {}, notes: '', adherence: null }; logs.unshift(log); }
  if (!log.blocks) log.blocks = {};
  log.blocks[idx] = !log.blocks[idx];
  const done = log.blocks[idx];
  row.style.background = done ? 'rgba(76,175,125,0.1)' : 'var(--bg2)';
  row.style.borderColor = done ? 'var(--green)' : 'var(--border)';
  const box = row.querySelector('div');
  box.style.borderColor = done ? 'var(--green)' : 'var(--border2)';
  box.style.background = done ? 'var(--green)' : 'transparent';
  box.style.color = done ? '#000' : 'transparent';
  row.querySelector('div:nth-child(2) div').style.color = done ? 'var(--green)' : 'var(--text)';
  DB.set(DB.keys.schedule, logs);
  updateFollowScore(log.blocks);
}

function updateFollowScore(blocks) {
  const done = Object.values(blocks).filter(Boolean).length;
  // update in parent score view if visible
}

function setAdh(val, el) {
  schedAdh = val;
  ['low','mid','high'].forEach(k => {
    const b = document.getElementById('adh-'+k);
    b.style.background = ''; b.style.borderColor = ''; b.style.color = '';
    b.className = 'btn btn-ghost btn-sm';
  });
  const colors = { low: 'var(--red)', mid: 'var(--amber)', high: 'var(--green)' };
  el.style.background = colors[val] + '33';
  el.style.borderColor = colors[val];
  el.style.color = colors[val];
}

function saveSchedLog() {
  const logs = DB.get(DB.keys.schedule, []);
  const today = D.today();
  let log = logs.find(l => l.date === today);
  if (!log) { log = { date: today, blocks: {} }; logs.unshift(log); }
  log.notes = document.getElementById('sched-notes').value.trim();
  log.adherence = schedAdh;
  const done = Object.values(log.blocks || {}).filter(Boolean).length;
  log.blockScore = Math.round(done / SCHEDULE.length * 100);
  DB.set(DB.keys.schedule, logs);
  toast('Schedule log saved'); renderHistory(); renderChart();
}

function renderChart() {
  const logs = DB.get(DB.keys.schedule, []);
  const last14 = Array.from({length:14},(_,i)=>{const d=new Date();d.setDate(d.getDate()-(13-i));return d.toISOString().slice(0,10);});
  const scoreByDate = {};
  const adhVal = { low: 30, mid: 65, high: 100 };
  logs.forEach(l => { scoreByDate[l.date] = l.blockScore ?? (adhVal[l.adherence] || 0); });
  if (adhChart) adhChart.destroy();
  adhChart = sparkBar(document.getElementById('chart-adh').getContext('2d'),
    last14.map(d => D.fmt(d)),
    last14.map(d => scoreByDate[d] ?? null),
    '#4fc3f7');
}

function renderHistory() {
  const logs = DB.get(DB.keys.schedule, []);
  const el = document.getElementById('sched-history');
  if (!logs.length) { el.innerHTML = '<div class="empty">No schedule logs yet.</div>'; return; }
  const adhColor = { low: 'var(--red)', mid: 'var(--amber)', high: 'var(--green)' };
  el.innerHTML = logs.slice(0, 14).map(l => {
    const done = Object.values(l.blocks||{}).filter(Boolean).length;
    return `<div class="card" style="margin-bottom:8px;">
      <div class="row-between" style="margin-bottom:6px;">
        <span style="font-size:12px;font-family:var(--mono);color:var(--text2);">${D.fmtFull(l.date)}</span>
        <div class="row" style="gap:6px;">
          <span style="font-size:11px;font-family:var(--mono);color:var(--text3);">${done}/${SCHEDULE.length} blocks</span>
          ${l.adherence ? `<span style="font-size:11px;color:${adhColor[l.adherence]};font-family:var(--mono);">${l.adherence}</span>` : ''}
        </div>
      </div>
      ${l.notes ? `<div style="font-size:12px;color:var(--text2);line-height:1.5;">${l.notes}</div>` : ''}
    </div>`;
  }).join('');
}

renderSchedule();
renderFollowBlocks();
renderHistory();
renderChart();
</script>
</body>
</html>
